name: vuln_mining_tf_blackbox
version: 1.0

mode: batch
interaction: false

entry: prompt.md

output:
  dir: .

constraints:
  black_box: true
  no_cve: true
  no_known_vuln_db: true
  ai_generated_tests: true
  require_verification: true

deliverables:
  - vulnerability_list.md
  - llm_chat_log.json
  - vulnerability_report.md
  - verify/run_test.py
